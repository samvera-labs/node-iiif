<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div class="container pt-5">
        <div class="row justify-content-center">
            <div id="osd-container" style="width:1097px; height: 823px; background-color: black;"></div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.2.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/openseadragon@v4.1.1/build/openseadragon/openseadragon.min.js"></script>
    <script>
        $(document).ready(function () {
            const viewer = OpenSeadragon(
                {
                    id: "osd-container",
                    prefixUrl: 'https://cdn.jsdelivr.net/npm/openseadragon@v4.1.1/build/openseadragon/images/',
                    showNavigator: true,
                    navigatorSizeRatio: 0.1,
                    minZoomImageRatio: 0.8,
                    maxZoomPixelRatio: 10,
                    controlsFadeDelay: 1000,
                    tileSources: { tileSource: "http://localhost:3000/iiif/3/nypl_1949733-vips-4/info.json" }
                }
            );
        });
    </script>
</body>
